# rental-spec for benchmarks-<CAMPAIGN> (thinking-on companion under bd <CAMPAIGN>):
# Sehyo/Qwen3.5-122B-A10B-NVFP4 with enable_thinking=true.
#
# Companion to qwen3.5-122b-a10b-nvfp4.yaml (the thinking-off baseline that
# gave the current sweep-status row 0.872 / 0.861 / 0.297 — currently missing
# the ᵗ marker but ran thinking-off per the qwen3-family-era convention; bd
# 3pg covers both the marker fix and this paired-mode rerun under <CAMPAIGN>).
#
# Prerequisites (validated 2026-05-24):
#   - bd <CAMPAIGN> None-tolerance landed (run-pool-b.sh post-generate sample
#     filter + bigcodebench/sanitize.py GENERATE-phase patch via bd <ISSUE>).
#   - VLLM_BCB_MAX_TOKENS=16384 default (commit 21ed61b).
#   - HE+/IFEval max_gen_toks lifted to 16K (commit 7345bde, bd <ISSUE>).
#
# Hardware: Runcrate RTXPro6000 ×2 (auto-deploy by {gpu_type, gpu_count}).
# Same SKU shape as the thinking-off twin and <CAMPAIGN> Nemotron — see memory
# feedback_runcrate_inventory_scan.md for the rotation discipline.
#
# Math: ~71 GB NVFP4 weights / 2 = ~36 GB/GPU. 96 GB Blackwell leaves
# ~60 GB/GPU free; 256K KV at TP=2 needs ~32 GB/GPU, fits with ~28 GB margin
# (same shape as the thinking-off twin).
#
# Operator-set fields before launch:
#   rental_host — IP of the deployed RTXPro6000 ×2 box.

model_id: Sehyo/Qwen3.5-122B-A10B-NVFP4
rental_host: REPLACE-ME-WITH-ACTUAL-RENTAL-HOSTNAME-OR-IP
rental_user: root

# Sehyo packs NVFP4 weights using the `compressed-tensors` config format
# (not the bare `nvfp4` config that nvidia/Nemotron uses) — vLLM ModelConfig
# rejects --quantization nvfp4 against this checkpoint. Same underlying
# kernel family (CUTLASS NVFP4 grouped-GEMM); only the metadata wrapper
# differs. See the thinking-off twin for full archaeology.
quant: compressed-tensors

# 122B total / 10B active. --enable-expert-parallel must stay OFF (vLLM
# #32826 reproduces on RTXPro6000 in EP mode; consistent with <CAMPAIGN>/.8).
tensor_parallel_size: 2
# 256K target per feedback_context_length_policy_2026-05-18 — gives thinking
# generations the headroom they need.
max_model_len: 262144

vllm_min_version: "0.21.0"

# VLLM_NVFP4_GEMM_BACKEND=marlin (bd <ISSUE> 2026-05-18): vLLM 0.21 JIT-compiles
# the NVFP4 CUTLASS SM120 kernel via FlashInfer, which our cuda-toolkit-13-0
# install can't satisfy. Marlin sidesteps the JIT entirely.
vllm_env:
  VLLM_NVFP4_GEMM_BACKEND: "marlin"

# vLLM serving args.
#
# enable_thinking=TRUE — the entire point of this variant. Measures the
# thinking-on cell under bd <CAMPAIGN>.
#
# --reasoning-parser qwen3 KEPT (and required) on the thinking-on path: it
# splits <think>...</think> blocks into .reasoning_content so .content stays
# clean for Pool B graders (lm-eval-harness / bigcodebench openai clients).
#
# --tool-call-parser qwen3_xml (NOT hermes — that's only for Qwen3-235B-
# Thinking-2507 per qwen3-thinking-hermes-parser-2026-05-20).
#
# --gdn-prefill-backend triton required for Qwen3-arch GDN attention on
# vLLM ≥0.20 (same as the thinking-off twin and <CAMPAIGN> specs).
vllm_args:
  - --gdn-prefill-backend
  - triton
  - --enable-prefix-caching
  - --default-chat-template-kwargs
  - '{"enable_thinking": true}'
  - --reasoning-parser
  - qwen3
  - --tool-call-parser
  - qwen3_xml
  - --enable-auto-tool-choice

local_port: 8001  # thinking-on lane; thinking-off twin uses 8001 too, but
                  # each rental has its own port space — no collision
