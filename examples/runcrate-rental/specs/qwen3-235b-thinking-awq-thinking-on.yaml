# rental-spec for benchmarks-<CAMPAIGN> (thinking-on canary variant):
# QuantTrio/Qwen3-235B-A22B-Thinking-2507-AWQ with enable_thinking=true.
#
# Companion to qwen3-235b-thinking-awq.yaml (the thinking-off baseline).
# Used by the <CAMPAIGN> thinking-on delta measurement when the Pool B None-
# tolerance fixes (bd <CAMPAIGN>) are in place — until then, thinking-on runs
# crash Pool B scorers when max_gen_toks hits inside <think>...</think> and
# response.content comes back as None. Keep this spec out of the default
# sweep loop; reach for it only for the canary comparison.
#
# Hardware: Runcrate RTXPro6000 ×2 (auto-deploy by {gpu_type, gpu_count}).
# Same SKU shape as the thinking-off twin and <CAMPAIGN> — see memory
# runcrate-sku-mapping-for-benchmarks-rlp-4-11.
#
# Math: 235B AWQ-INT4 weights ≈ 116 GB → 58 GB/GPU at TP=2. 96 GB Blackwell
# leaves ~38 GB/GPU free for KV + activations. 128K KV at TP=2 fits
# comfortably; 256K KV needs ~48 GB/GPU which overflows — see the
# max_model_len comment below.
#
# Operator-set fields before launch:
#   rental_host — IP of the deployed RTXPro6000 ×2 box.

model_id: QuantTrio/Qwen3-235B-A22B-Thinking-2507-AWQ
rental_host: REPLACE-ME-WITH-ACTUAL-RENTAL-HOSTNAME-OR-IP
rental_user: root

# AWQ-INT4 quantization. QuantTrio packages with `quant_method=awq` in
# config.json — pass --quantization awq.
quant: awq

# TP=2 weight-shard. --enable-expert-parallel MUST stay off at TP=2 per
# QuantTrio model card (MoE EP routing overhead exceeds benefit at 2 GPUs).
tensor_parallel_size: 2

# 128K — capped at the floor on TP=2 due to KV-cache budget. Same math as
# the thinking-off twin: 116 GB AWQ weights / 2 GPU = 58 GB/GPU; 96 GB
# Blackwell leaves ~38 GB/GPU free; a single 256K seq needs ~48 GB/GPU at
# bf16 — overflows. Per memory feedback_context_length_policy_2026-05-18,
# 256K is the policy target when GPU+KV fits; 128K is the absolute floor.
# Upgrading to RTXPro6000 ×4 unblocks 256K. Native model context is 256K
# via YaRN — gate is the rental, not the model.
max_model_len: 131072

vllm_min_version: "0.21.0"

# enable_thinking=TRUE — the entire point of this canary variant. Measures
# the thinking-on delta vs the <CAMPAIGN>/.10 thinking-off baseline.
#
# CAVEAT (<CAMPAIGN> dependency): with reasoning_parser=qwen3 + enable_thinking
# =true, vLLM splits at <think>...</think> sentinels into reasoning_content
# and content. If max_gen_toks hits during the think section,
# response.content = None — which Pool B scorers (humaneval+ filter,
# ifeval scorer, bigcodebench sanitize) all crash on. DO NOT launch this
# spec into a Pool B sweep until the <CAMPAIGN> None-tolerance patches land.
# See docs/research/<CAMPAIGN>-pool-b-postmortem-2026-05-15.md and
# bd memory qwen3-thinking-disabled-measurement-bias-2026-05-15.
#
# --gdn-prefill-backend triton: Qwen3 architecture's Gated Delta Network
# attention prefill kernel requires the Triton backend on vLLM ≥0.20 — same
# rationale as <CAMPAIGN>/<CAMPAIGN> specs.
vllm_args:
  - --gdn-prefill-backend
  - triton
  - --enable-prefix-caching
  - --default-chat-template-kwargs
  - '{"enable_thinking": true}'
  - --reasoning-parser
  - qwen3
  # Tool-call parser + auto-choice (bd <ISSUE> 2026-05-19, REVISED 2026-05-20):
  # qwen3_xml → hermes after bd <ISSUE> EB shakedown showed Thinking-2507 emits
  # Hermes-style <tool_call>{json}</tool_call> wrappers, not Qwen3-Coder XML.
  # See 256k-thinking-on spec for full rationale + upstream evidence.
  - --tool-call-parser
  - hermes
  - --enable-auto-tool-choice

local_port: 8003  # thinking-on canary lane (<CAMPAIGN> + <CAMPAIGN>); avoids
                  # collision with the thinking-off twin on 8002
